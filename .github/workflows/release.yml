# Release pipeline — Contract 16A + 16B.
#
# Triggered by a CalVer git tag (`YYYY.MM.PATCH`). Builds three
# platform artifacts in a matrix, generates SHA-256 checksums,
# CycloneDX SBOMs, and SLSA build-provenance attestations, and
# uploads everything to a GitHub Release.
#
# Signing notes (see docs/release-signing.md):
#   * macOS  — signed with the Apple Developer ID + notarized via
#              `notarytool`. Secrets: APPLE_CERTIFICATE,
#              APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
#              APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID.
#   * Linux  — unsigned by CI. The maintainer signs the .AppImage
#              and .deb LOCALLY with the project GPG key and uploads
#              the detached `.asc` signatures to the release. The
#              release-finalize job is intentionally manual.
#   * Windows — unsigned at Phase 1. CLAUDE.md §6.2 + Contract 16
#              §Constraints document the absence; the website /
#              install guide carries the disclaimer.
#
# The Ed25519 updater key IS loaded into CI as the
# TAURI_SIGNING_PRIVATE_KEY repository secret (paired with
# TAURI_SIGNING_PRIVATE_KEY_PASSWORD). The `tauri build` step below
# maps both into its own env: block; the values are decrypted into
# the runner's process environment only for that step's duration.
# Approach #2 from docs/release-signing.md. Approach #1 (local
# signing) is documented as the alternative; approach #3 (OIDC-gated
# vault) is the future hardening target.
#
# Every Action is pinned to a full commit SHA — Contract 16
# §Constraints. The trailing comment is informational; updates
# require a deliberate PR.

name: release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    # Per-platform timeouts so a slow macOS job fails on its own
    # clock with a clear signal and does not consume time that masks
    # the real cause (Contract 18). macOS gets 90 min — generous
    # enough for a warm-cache compile (~5–10 min), code-signing,
    # `xcrun notarytool submit --wait`, and the SBOM/checksum/attest
    # tail. Linux and Windows finish in well under 45 min on a
    # warm cache. The cold-cache first run after the rust-cache fix
    # also fits inside these envelopes — see Contract 18 §Edge Cases.
    timeout-minutes: ${{ matrix.platform.timeout }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: linux,   runner: ubuntu-latest,  bundles: "deb,appimage", timeout: 45 }
          - { name: macos,   runner: macos-latest,   bundles: "dmg,app",      timeout: 90 }
          - { name: windows, runner: windows-latest, bundles: "nsis",         timeout: 45 }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "src-tauri -> target"

      # Phase 1 — ScoutSuite bundling.
      #
      # Tauri 2 requires a `vendor/scoutsuite/<triple>/scoutsuite[.exe]`
      # at the time `tauri build` evaluates `bundle.resources`. We
      # produce it here by freezing the vendored ScoutSuite source with
      # PyInstaller, then writing `vendor/scoutsuite/pinned.json` so
      # `src-tauri/build.rs::generate_scoutsuite_pin()` bakes the SHA
      # into `src/scanner/binary.rs::PLATFORM_PINNED_SHA256` at compile
      # time. Without this step the installed app falls through to the
      # "binary not bundled" UX path (still functional dev experience,
      # but unusable as a security scanner).
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: stage bundled scoutsuite
        shell: bash
        run: |
          set -euo pipefail
          cd vendor/scoutsuite
          # Pinned PyInstaller + ScoutSuite's own runtime deps. The two
          # requirements files are tracked in-repo so the version surface
          # is reviewable in PRs.
          python -m pip install --upgrade pip
          pip install -r pyinstaller-requirements.txt -r requirements.txt
          pyinstaller cloudsaw.spec --distpath dist --workpath build --clean --noconfirm

          # Resolve the Rust target triple this matrix job builds for —
          # MUST match `src-tauri/build.rs::generate_scoutsuite_pin()`'s
          # validation (which reads cargo's TARGET env var).
          case "${{ matrix.platform.name }}" in
            linux)   TRIPLE="x86_64-unknown-linux-gnu" ;;
            macos)   TRIPLE="aarch64-apple-darwin"    ;;
            windows) TRIPLE="x86_64-pc-windows-msvc"  ;;
            *)       echo "::error::unknown platform '${{ matrix.platform.name }}'"; exit 1 ;;
          esac

          case "${{ matrix.platform.name }}" in
            windows) BIN_NAME="scoutsuite.exe" ;;
            *)       BIN_NAME="scoutsuite"     ;;
          esac

          # Stage the binary into the path `tauri.conf.json#bundle.resources`
          # globs against. The `_dev_placeholder` written by `build.rs` (a
          # 0-byte stub for local dev) gets overwritten by this copy.
          mkdir -p "../../src-tauri/vendor/scoutsuite/$TRIPLE"
          cp "dist/$BIN_NAME" "../../src-tauri/vendor/scoutsuite/$TRIPLE/$BIN_NAME"
          if [ "${{ matrix.platform.name }}" != "windows" ]; then
            chmod +x "../../src-tauri/vendor/scoutsuite/$TRIPLE/$BIN_NAME"
          fi

          # Compute SHA-256 of the staged binary and write pinned.json.
          # NOTE: we hash the EXTRACTED binary, not the dist/ copy — they
          # are byte-identical via `cp`, but doing this here makes the
          # write atomic with respect to the cargo build that reads it.
          cd ../../src-tauri/vendor/scoutsuite
          if command -v shasum >/dev/null; then
            SHA=$(shasum -a 256 "$TRIPLE/$BIN_NAME" | awk '{print $1}')
          else
            SHA=$(sha256sum "$TRIPLE/$BIN_NAME" | awk '{print $1}')
          fi
          cat > pinned.json <<EOF
          {"binary": "scoutsuite", "triple": "$TRIPLE", "sha256": "$SHA"}
          EOF
          echo "Staged scoutsuite binary + pinned.json:"
          cat pinned.json
          ls -la "$TRIPLE/"

      - name: install linux tauri prereqs
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev build-essential curl wget \
            file libxdo-dev pkg-config

      # macOS code-signing setup. The certificate is base64-encoded in
      # the secret; we materialize it into a temporary keychain and
      # let Tauri's bundler pick it up via TAURI_SIGNING_IDENTITY.
      - name: import apple developer id certificate
        if: matrix.platform.name == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -e
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::warning::APPLE_CERTIFICATE not set — macOS artifact will be UNSIGNED"
            echo "CLOUDSAW_MACOS_SIGNED=0" >> $GITHUB_ENV
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          # Extend the lock-when-idle timeout to 2 hours (default is 5
          # min). `tauri build` on macOS takes ~4-5 min just to compile,
          # then signs the inner binary, then signs the .app wrapper,
          # then submits to notarytool. If the keychain auto-locks
          # between sign operations, the next codesign call blocks on a
          # passphrase prompt that never comes (no UI on the runner)
          # and the job hangs until the job-level timeout fires.
          #
          # 7200s (2h) comfortably covers any realistic build duration
          # (~20 min in practice) without keeping the cert keychain
          # available longer than the job needs. The explicit re-lock
          # step after `tauri build` below releases it as soon as
          # signing+notarization are done — we don't want the keychain
          # unlocked during SBOM generation, checksumming, or artifact
          # upload.
          security set-keychain-settings -lut 7200 build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain
          rm -f /tmp/cert.p12
          echo "CLOUDSAW_MACOS_SIGNED=1" >> $GITHUB_ENV

      # Preflight notarization credentials BEFORE the 5+ minute build.
      # Apple's notary service can hang for a long time (60+ min observed)
      # when it gets bad creds — by calling `notarytool history` first
      # we get a definitive 200/401 in ~10 seconds and surface the
      # specific misconfiguration with a clear error message. The
      # `timeout 60s` guarantees this step itself cannot hang.
      - name: verify apple notarization credentials
        if: matrix.platform.name == 'macos'
        # Step-level cap. `xcrun notarytool history` normally returns
        # in under 5 seconds; if Apple's API stalls we get a hard fail
        # at 2 minutes instead of letting the build job's 150 min
        # ceiling absorb it. Step-level timeout is portable across
        # runners (no GNU `timeout` binary required — macOS doesn't
        # ship coreutils).
        timeout-minutes: 2
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -eu
          fail=0
          if [ -z "${APPLE_ID:-}" ]; then
            echo "::error::APPLE_ID secret is empty — add the Apple ID email to repository secrets"
            fail=1
          fi
          if [ -z "${APPLE_PASSWORD:-}" ]; then
            echo "::error::APPLE_PASSWORD secret is empty — add an app-specific password from appleid.apple.com"
            fail=1
          fi
          if [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "::error::APPLE_TEAM_ID secret is empty — add the 10-char Team ID from developer.apple.com (Membership)"
            fail=1
          elif [ "${#APPLE_TEAM_ID}" -lt 3 ]; then
            echo "::error::APPLE_TEAM_ID is shorter than 3 chars (got length ${#APPLE_TEAM_ID}) — notarytool requires the full 10-char ID"
            fail=1
          fi
          if [ "$fail" -eq 1 ]; then
            exit 1
          fi
          # Soft check: app-specific passwords are xxxx-xxxx-xxxx-xxxx
          # (19 chars w/ hyphens). Don't hard-fail in case Apple ever
          # changes the format, but warn loudly.
          if ! printf '%s' "$APPLE_PASSWORD" \
              | grep -Eq '^[a-z]{4}-[a-z]{4}-[a-z]{4}-[a-z]{4}$'; then
            echo "::warning::APPLE_PASSWORD does not match the xxxx-xxxx-xxxx-xxxx app-specific password format (length ${#APPLE_PASSWORD}). If notarization fails with 'Invalid credentials', regenerate the password at https://appleid.apple.com → Sign-In and Security → App-Specific Passwords."
          fi
          echo "Calling \`xcrun notarytool history\` to verify credentials live against Apple's notary service..."
          if ! xcrun notarytool history \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" > /tmp/notarytool-history.log 2>&1; then
            echo "::error::Apple's notary service rejected the supplied credentials. Common causes:"
            echo "::error::  1. APPLE_PASSWORD is the regular Apple ID password, not an app-specific password from appleid.apple.com."
            echo "::error::  2. APPLE_ID does not match the account that generated the app-specific password."
            echo "::error::  3. APPLE_ID is not a member of the team identified by APPLE_TEAM_ID, or lacks the Admin/Account Holder role required for notarization."
            echo "::error::  4. notarytool returned a non-zero exit code for another reason — see the captured stdout/stderr below."
            echo "::group::notarytool output"
            cat /tmp/notarytool-history.log || true
            echo "::endgroup::"
            exit 1
          fi
          echo "Apple notary credentials verified. Proceeding to tauri build."

      # macOS-only: codesign the inner ScoutSuite binary BEFORE
      # `tauri build` runs. PyInstaller-produced Mach-O has no
      # Developer ID signature; `notarytool submit --wait` (driven by
      # `tauri build`) rejects the bundle if any executable inside
      # lacks an accepted authority's signature. We sign with the same
      # identity the outer .app uses.
      #
      # CRITICAL: codesign rewrites the binary's signature blob inside
      # the Mach-O, so the on-disk SHA changes. We refresh pinned.json
      # AFTER signing so `src-tauri/build.rs::generate_scoutsuite_pin()`
      # — which runs inside `tauri build`'s cargo invocation — bakes the
      # POST-signing SHA into `PLATFORM_PINNED_SHA256`. Without this
      # refresh, the runtime `verify_sha256()` check would compare the
      # installed (signed) binary against the pre-signing pin and fail
      # integrity on every launch.
      - name: codesign bundled scoutsuite (macOS)
        if: matrix.platform.name == 'macos' && env.CLOUDSAW_MACOS_SIGNED == '1'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -eu
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -lut 7200 build.keychain
          BIN=src-tauri/vendor/scoutsuite/aarch64-apple-darwin/scoutsuite
          codesign --force --options runtime --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" "$BIN"
          codesign --verify --verbose "$BIN"
          NEW_SHA=$(shasum -a 256 "$BIN" | awk '{print $1}')
          cat > src-tauri/vendor/scoutsuite/pinned.json <<EOF
          {"binary": "scoutsuite", "triple": "aarch64-apple-darwin", "sha256": "$NEW_SHA"}
          EOF
          echo "Post-codesign pinned.json:"
          cat src-tauri/vendor/scoutsuite/pinned.json

      # Belt-and-suspenders re-unlock immediately before `tauri build`.
      # The keychain *should* still be unlocked from the import step
      # above, but several minutes of compile time pass before any
      # codesign call fires, and an extra `unlock-keychain` here costs
      # nothing while removing any chance of a stale-lock hang.
      - name: re-unlock build.keychain before tauri build
        if: matrix.platform.name == 'macos'
        run: |
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -lut 7200 build.keychain

      - name: tauri build
        env:
          # macOS signing identity (e.g. "Developer ID Application: Acme (TEAMID)").
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater signing — CI-side signing posture (approach #2
          # in docs/release-signing.md). The Ed25519 private key is held
          # as a GitHub Actions encrypted repository secret and decrypted
          # into THIS step's process environment only for the duration of
          # `tauri build`. The secret is never committed, never echoed,
          # and the env mapping is scoped to this single step (not the
          # whole job) to keep exposure minimum. A future hardening step
          # is OIDC-gated retrieval from an external vault (approach #3).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles ${{ matrix.platform.bundles }}

      # Re-lock the cert keychain as soon as `tauri build` (which
      # includes signing + notarization) finishes. The remaining steps
      # — SBOM generation, checksum computation, attestation, artifact
      # upload — do NOT need the Apple signing key. Locking here keeps
      # the cert unavailable for the rest of the job, even if a later
      # step were to execute attacker-controlled code. `if: always()`
      # ensures we lock even if `tauri build` failed.
      - name: lock build.keychain after tauri build
        if: ${{ always() && matrix.platform.name == 'macos' }}
        run: |
          security lock-keychain build.keychain || true

      - name: compute sha-256 checksums
        shell: bash
        run: |
          set -e
          mkdir -p out
          # NOTE: `*.tar.gz` is the macOS updater bundle (CloudSaw.app.tar.gz)
          # — without it, the .sig is published but the artifact it signs is
          # missing and the auto-updater can't pull the macOS payload. See
          # the "stage updater artifacts" step in the publish job for how
          # latest.json is constructed from these files.
          find src-tauri/target/release/bundle -type f \
            \( -name "*.dmg" -o -name "*.app" -o -name "*.deb" \
               -o -name "*.AppImage" -o -name "*.exe" \
               -o -name "*.msi" -o -name "*.nsis.zip" \
               -o -name "*.tar.gz" \
               -o -name "*.sig" \) -print0 | while IFS= read -r -d '' f; do
            cp "$f" out/
          done
          cd out
          if command -v shasum >/dev/null; then
            shasum -a 256 * | tee SHA256SUMS-${{ matrix.platform.name }}.txt
          else
            sha256sum * | tee SHA256SUMS-${{ matrix.platform.name }}.txt
          fi

      - name: install cyclonedx generators
        if: matrix.platform.name == 'linux'
        run: |
          cargo install --locked cargo-cyclonedx
          npm install --no-save @cyclonedx/cyclonedx-npm

      - name: generate cyclonedx sboms
        if: matrix.platform.name == 'linux'
        run: |
          set -euo pipefail
          # `cargo cyclonedx` 0.5+ changed its default output path (the
          # SBOM can land in src-tauri/, src-tauri/target/cyclonedx/<crate>/,
          # or elsewhere depending on version). `find` it after the tool
          # runs so a future cargo-cyclonedx release doesn't break this
          # step silently.
          cargo cyclonedx --manifest-path src-tauri/Cargo.toml \
            --format json --override-filename cloudsaw-rust-sbom
          SBOM=$(find src-tauri -type f \
            \( -name "cloudsaw-rust-sbom*.cdx.json" \
               -o -name "cloudsaw-rust-sbom*.json" \) -print -quit)
          if [ -z "${SBOM:-}" ]; then
            echo "::error::cargo cyclonedx produced no SBOM under src-tauri/"
            echo "Files that look SBOM-shaped:"
            find src-tauri \( -name "*.cdx.json" -o -path "*cyclonedx*" \) -print || true
            exit 1
          fi
          echo "Found Rust SBOM at: $SBOM"
          mv "$SBOM" out/cloudsaw-rust-sbom.cdx.json
          npx @cyclonedx/cyclonedx-npm --output-file out/cloudsaw-npm-sbom.cdx.json
          test -s out/cloudsaw-rust-sbom.cdx.json
          test -s out/cloudsaw-npm-sbom.cdx.json
        continue-on-error: false

      - name: attest build provenance # using actions/attest per v4 release notes deprecating attest-build-provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            out/*

      - name: upload artifacts to workflow run
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.platform.name }}
          path: out/

  publish:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # The build job already validated the artifact contents; this step
      # makes sure the GIT TAG matches `tauri.conf.json` so the binaries
      # the build matrix produced (whose filenames are derived from
      # tauri.conf's version) line up with the tag the release is
      # published under. A drift here is what caused 2026.05.7 to ship
      # binaries named `_2026.5.0_` — we fail loud here rather than
      # silently publishing mismatched artifacts.
      - name: validate tag matches tauri.conf.json version
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          conf_version=$(node -e \
            "console.log(require('./src-tauri/tauri.conf.json').version)")
          if [ "$tag" != "$conf_version" ]; then
            echo "::error::Tag '$tag' does not match src-tauri/tauri.conf.json version '$conf_version'. Bump the conf file in a PR, merge, then re-tag."
            exit 1
          fi
          # Reject zero-padded months/patches early — semver tolerates
          # leading zeros but tooling around it (and humans reading the
          # release page) does not.
          if printf '%s' "$tag" \
              | grep -Eq '^[0-9]{4}\.0[0-9]+\.|^[0-9]{4}\.[0-9]+\.0[0-9]+$'; then
            echo "::error::Tag '$tag' uses zero-padded month or patch. Use YYYY.M.PATCH without leading zeros (e.g. 2026.5.8, not 2026.05.8 or 2026.5.08)."
            exit 1
          fi
          echo "Tag $tag matches tauri.conf.json. Proceeding."

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
      - name: stage release files
        run: |
          set -e
          mkdir -p release
          find artifacts -type f -print0 | while IFS= read -r -d '' f; do
            cp "$f" release/
          done
          cd release
          # Combined checksum file across platforms — easier for users to
          # verify the artifact they downloaded.
          cat SHA256SUMS-linux.txt SHA256SUMS-macos.txt SHA256SUMS-windows.txt \
            > SHA256SUMS.txt
          ls -lah

      # Build the Tauri updater manifest from the per-platform .sig
      # files. Without latest.json, an installed CloudSaw never learns
      # a new version exists (the updater plugin fetches THIS file from
      # the URL configured in tauri.conf.json#plugins.updater.endpoints).
      #
      # The .sig files are minisign signatures produced by `tauri build`
      # using the TAURI_SIGNING_PRIVATE_KEY secret. We base64-decode
      # them inline so the installed client can verify against the
      # public key baked into tauri.conf.json.
      - name: generate latest.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd release

          version="$TAG"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Glob each platform's signed artifact + .sig. The filename
          # patterns must match what `tauri build` actually emitted; we
          # use shell globs (not hardcoded names) so a future Tauri
          # version that bumps a name suffix doesn't break this step
          # silently.
          read_sig() {
            local file="$1"
            if [ ! -f "$file" ]; then
              echo "::error::Missing signature file: $file"
              return 1
            fi
            # The .sig file is already a minisign signature — Tauri
            # consumes it verbatim, not base64-wrapped a second time.
            cat "$file"
          }

          macos_sig_file="$(ls CloudSaw.app.tar.gz.sig 2>/dev/null || true)"
          macos_archive="$(ls CloudSaw.app.tar.gz 2>/dev/null || true)"
          linux_sig_file="$(ls CloudSaw_*_amd64.AppImage.sig 2>/dev/null || true)"
          linux_archive="$(ls CloudSaw_*_amd64.AppImage 2>/dev/null || true)"
          windows_sig_file="$(ls CloudSaw_*_x64-setup.exe.sig 2>/dev/null || true)"
          windows_archive="$(ls CloudSaw_*_x64-setup.exe 2>/dev/null || true)"

          # Fail loud if any platform's pair is incomplete — partial
          # latest.json files cause cryptic update failures rather than
          # a clean "no update" outcome.
          for pair in \
            "macos:$macos_archive:$macos_sig_file" \
            "linux:$linux_archive:$linux_sig_file" \
            "windows:$windows_archive:$windows_sig_file"; do
            IFS=':' read -r platform archive sig <<< "$pair"
            if [ -z "$archive" ] || [ -z "$sig" ]; then
              echo "::error::${platform} updater pair incomplete — archive='$archive' sig='$sig'. Did the matrix job upload both artifacts?"
              exit 1
            fi
          done

          macos_sig="$(read_sig "$macos_sig_file")"
          linux_sig="$(read_sig "$linux_sig_file")"
          windows_sig="$(read_sig "$windows_sig_file")"

          base_url="https://github.com/Camdun-Solutions/CloudSaw/releases/download/${version}"

          jq -n \
            --arg version "$version" \
            --arg pub_date "$pub_date" \
            --arg macos_url "${base_url}/${macos_archive}" \
            --arg macos_sig "$macos_sig" \
            --arg linux_url "${base_url}/${linux_archive}" \
            --arg linux_sig "$linux_sig" \
            --arg windows_url "${base_url}/${windows_archive}" \
            --arg windows_sig "$windows_sig" \
            '{
              version: $version,
              notes: "See the release page for the full changelog.",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $macos_sig, url: $macos_url },
                "darwin-x86_64":  { signature: $macos_sig, url: $macos_url },
                "linux-x86_64":   { signature: $linux_sig, url: $linux_url },
                "windows-x86_64": { signature: $windows_sig, url: $windows_url }
              }
            }' > latest.json
          echo "Generated latest.json:"
          cat latest.json
      - name: publish github release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: CloudSaw ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          body: |
            **Signing status**

            * macOS (.dmg): signed with the Apple Developer ID + notarized.
            * Linux (.AppImage, .deb): unsigned in CI. The maintainer attaches
              a detached GPG signature (`.asc`) to this release after manual
              signing. Verify with `gpg --verify cloudsaw_*.AppImage.asc cloudsaw_*.AppImage`.
            * Windows (.exe NSIS): **unsigned** at this stage. Read the install
              guide on cloud-saw.com for the verification path.

            **Auto-updater**

            `latest.json` (the manifest the Tauri updater plugin reads)
            is generated by the publish job using the per-platform
            `.sig` files the build job produced with the
            `TAURI_SIGNING_PRIVATE_KEY` secret. Installed apps verify
            each platform's signature against the public key baked
            into `tauri.conf.json` before applying.

            **Supply-chain artifacts**

            * `SHA256SUMS.txt` — checksums for every artifact.
            * `cloudsaw-rust-sbom.cdx.json` + `cloudsaw-npm-sbom.cdx.json`
              — CycloneDX SBOMs.
            * Build-provenance attestations (SLSA) via `actions/attest-build-provenance`.
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
